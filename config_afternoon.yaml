# 午报关键词配置 — 跨区域 + 省间现货 + 行业自媒体（10词）
# 版本 v2.0 | 2026-07-07

keywords:
  # 跨区域
  - name: "重庆电力交易中心"
    kw: "重庆电力交易中心"
  - name: "重庆电力市场"
    kw: "重庆电力市场"
  # 西北参考省
  - name: "宁夏电力交易中心"
    kw: "宁夏电力交易中心"
  - name: "宁夏电力市场"
    kw: "宁夏电力市场"
  # 省间/全国
  - name: "省间电力现货市场"
    kw: "省间电力现货市场"
  - name: "电力现货市场"
    kw: "电力现货市场"
  - name: "电力中长期市场"
    kw: "电力中长期市场"
  # 行业媒体/数据
  - name: "国能日新"
    kw: "国能日新"
  - name: "电联新媒"
    kw: "电联新媒"
  # 通用补漏
  - name: "电力交易"
    kw: "电力交易"

# ── 评分规则（与早报共用规则，但无探针）──
scoring:
  high_keywords:
    交易: 35
    电价: 35
    结算: 35
    偏差考核: 35
    电力中长期: 35
    月内交易: 35
    滚动撮合: 35
    现货: 30
    输配电价: 30
    代理购电: 30
    绿电交易: 30
    需求响应: 30
    售电: 30
    电力市场: 30
    保供: 25
    外送: 25
    特高压: 25
    电力调度: 25
    有序用电: 25
    绿证: 25
    新能源: 20
    储能: 20
    市场化: 20
    消纳: 20
    水电: 20
    光伏: 15
    风电: 15
    分布式: 15
    电网: 15
    准入: 15
    发电: 10
    配置: 10
    征求意见: 10

  low_keywords:
    党建: -30
    文明实践: -30
    志愿服务: -30
    人物故事: -30
    供电服务: -30
    主题活动: -20
    培训: -15
    会议精神: -15

  geo_boost:
    patterns: ["重庆", "宁夏", "四川", "省间"]
    score: 10

  geo_penalty:
    patterns: ["内蒙古", "广州", "山东", "河南", "西藏", "青岛", "广东", "浙江", "江苏", "福建", "湖北", "湖南", "安徽", "江西", "辽宁", "吉林", "黑龙江", "陕西", "甘肃", "青海", "新疆", "贵州", "云南", "广西", "海南", "山西", "河北"]
    score: -15

  time_bonus:
    today: 20
    yesterday: 10

  time_penalty_days: 3
  time_penalty: -20

  source_weights:
    "重庆电力交易中心": 25
    "宁夏电力交易中心": 25
    默认: 15

  thresholds:
    focus: 70
    normal: 45

# ── 重复检测 ──
dedup:
  cross_day_threshold: 0.8
  cross_period_enabled: true       # 午报检查早报去重
  morning_cache_file: "data/url_cache_morning.json"

# ── Firecrawl API ──
firecrawl:
  base_url: "https://api.firecrawl.dev/v2/scrape"
  wait_for_ms: 8000
  timeout_s: 30
  request_interval_s: 2
  key_file: "~/.hermes/keys/FIRECRAWL_API_KEY"

# ── 北极星搜索 ──
bjx:
  search_url_template: "https://news.bjx.com.cn/search/?kw={kw}&type=5"
  item_selector: "div.item"

# ── 输出配置 ──
output:
  max_focus: 3
  max_dynamic: 8
  date_window_days: 3
  output_file: "data/brief_afternoon.md"
  latest_file: "data/brief_afternoon_latest.md"
  url_cache_file: "data/url_cache_afternoon.json"
  empty_streak_file: "data/empty_streak_afternoon.txt"
  empty_streak_alert: 3
  max_chars: 1200
